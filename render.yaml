services:
  # ── Web API ────────────────────────────────────────────────────────────────
  - type: web
    name: buffalo-api
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pnpm i --frozen-lockfile && pnpm build && pnpm db:migrate:deploy
    startCommand: node dist/src/index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # set in Render dashboard
      - key: DIRECT_URL
        sync: false
      - key: API_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: STRIPE_ENABLED
        value: "true"
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: HUBSPOT_ENABLED
        value: "false"
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: GCAL_ENABLED
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFY_TO
        value: kunalrawat425@gmail.com
      - key: NOTIFY_FROM
        value: buffalo@resend.dev
      - key: NOTIFY_ON
        value: failure,recovery,daily
      - key: LOG_LEVEL
        value: info
      - key: OUTBOX_BATCH_SIZE
        value: "50"

  # ── Cron: fetch (producer) every 15 min ───────────────────────────────────
  - type: cron
    name: buffalo-cron-fetch
    env: node
    region: oregon
    plan: free
    rootDir: .
    schedule: "*/15 * * * *"
    buildCommand: pnpm i --frozen-lockfile && pnpm build
    startCommand: node dist/src/jobs/producer.job.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: STRIPE_ENABLED
        value: "true"
      - key: STRIPE_API_KEY
        sync: false
      - key: HUBSPOT_ENABLED
        value: "false"
      - key: GCAL_ENABLED
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFY_TO
        value: kunalrawat425@gmail.com
      - key: NOTIFY_FROM
        value: buffalo@resend.dev
      - key: NOTIFY_ON
        value: failure,recovery,daily
      - key: LOG_LEVEL
        value: info
      - key: OUTBOX_BATCH_SIZE
        value: "50"

  # ── Cron: process (outbox drain) every 5 min ─────────────────────────────
  - type: cron
    name: buffalo-cron-process
    env: node
    region: oregon
    plan: free
    rootDir: .
    schedule: "*/5 * * * *"
    buildCommand: pnpm i --frozen-lockfile && pnpm build
    startCommand: node dist/src/jobs/processor.job.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: STRIPE_ENABLED
        value: "true"
      - key: STRIPE_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: OUTBOX_BATCH_SIZE
        value: "50"

  # ── Cron: daily summary email 09:00 UTC ──────────────────────────────────
  - type: cron
    name: buffalo-cron-daily-summary
    env: node
    region: oregon
    plan: free
    rootDir: .
    schedule: "0 9 * * *"
    buildCommand: pnpm i --frozen-lockfile && pnpm build
    startCommand: node dist/src/jobs/daily-summary.job.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFY_TO
        value: kunalrawat425@gmail.com
      - key: NOTIFY_FROM
        value: buffalo@resend.dev
      - key: NOTIFY_ON
        value: failure,recovery,daily
      - key: LOG_LEVEL
        value: info
