services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: buffalo
      POSTGRES_PASSWORD: buffalo
      POSTGRES_DB: buffalo
    ports:
      - "5432:5432"
    volumes:
      - buffalo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buffalo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  buffalo_pg:
